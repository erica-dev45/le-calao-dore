<section id="menu" class="menu-section py-5">
  <div class="container">
    <h2 class="text-center mb-2">Notre <span class="text-or">Menu</span></h2>
    <p class="text-center text-muted mb-5">Entrées · Plats · Desserts</p>

    <div class="row">
      @for (dish of dishes; track dish.id) {
        <div class="col-12 col-md-6 col-lg-4 mb-4">
          <div class="card h-100 dish-card border-0 shadow-sm">
            <div class="card-body">

              <span class="badge mb-2"
                [ngClass]="{
                  'badge-entree':  dish.category === 'entree',
                  'badge-plat':    dish.category === 'plat',
                  'badge-dessert': dish.category === 'dessert'
                }">
                @switch (dish.category) {
                  @case ('entree')  { Entrée }
                  @case ('plat')    { Plat }
                  @case ('dessert') { Dessert }
                }
              </span>

              <h5 class="card-title mt-2 fw-bold">{{ dish.name }}</h5>
              <p class="card-text text-muted">{{ dish.description }}</p>
              <p class="price fw-bold mb-0">{{ dish.price | number }} FCFA</p>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
