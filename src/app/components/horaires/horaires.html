<section id="horaires" class="horaires-section py-5">
  <div class="container">
    <h2 class="text-center mb-2">Nos <span class="text-or">Horaires</span></h2>
    <p class="text-center text-muted mb-5">Ouvert 6 jours sur 7</p>

    <div class="row justify-content-center">
      <div class="col-12 col-md-7 col-lg-5">
        <ul class="list-group shadow-sm">
          @for (h of horaires; track h.jour) {
            <li class="list-group-item d-flex justify-content-between align-items-center"
              [class.current-day]="h.jour === jourActuel">

              <span class="fw-bold jour-label">{{ h.jour }}</span>

              @if (h.ferme) {
                <span class="badge bg-danger">Fermé</span>
              } @else {
                <span class="horaire-detail">
                  {{ h.ouverture }} – {{ h.fermeture }}
                  @if (h.jour === jourActuel) {
                    <span class="badge bg-success ms-2">Ouvert aujourd'hui</span>
                  }
                </span>
              }
            </li>
          }
        </ul>
      </div>
    </div>
  </div>
</section>
