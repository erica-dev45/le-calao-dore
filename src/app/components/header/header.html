<header class="header">
  <div class="header-inner">
    <div class="logo"> Le Calao Doré</div>

    <button class="burger" (click)="toggleMenu()" aria-label="Ouvrir le menu">
      ☰
    </button>

    <nav [class.open]="isMenuOpen">
      @for (link of links; track link) {
        
         <a [class.active]="activeLink === link"
          (click)="setActive(link)"
          href="#{{ link.toLowerCase() }}">
          {{ link }}
        </a>
      }
    </nav>
  </div>
</header>
